name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull and restart
        working-directory: /home/ftrookie/discord-bot
        run: |
          git pull --ff-only
          bun install --frozen-lockfile
          bun run build
          sudo systemctl restart discord-bot
